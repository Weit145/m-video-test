services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build:
      context: ./m-video-test-web-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/postgres"
      LOG_LEVEL: "INFO"
    ports:
      - "8080:8000"
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - app-network

  client:
    build:
      context: ./m-video-test-client
    depends_on:
      app:
        condition: service_healthy
    environment:
      URL: "http://app:8000/api/data"
      FILE_PATH: "/app/logs/client.log"
      M: "1000"
      N: "5"
      LOG_LEVEL: "INFO"
    volumes:
      - client_logs:/app/logs
    networks:
      - app-network

  background-processing:
    build:
      context: ./m-video-test-background-processing
    depends_on:
      app:
        condition: service_healthy
    environment:
      URL: "http://app:8000/api/data"
      FILE_PATH: "/app/data/background-data.txt"
      TIMER: "10"
      LOG_LEVEL: "INFO"
    volumes:
      - background_data:/app/data
    networks:
      - app-network

volumes:
  db_data:
  client_logs:
  background_data:

networks:
  app-network:
